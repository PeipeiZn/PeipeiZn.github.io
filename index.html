<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>蓝色计算器（完美修复版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #e6f4ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(22, 93, 255, 0.15);
            width: 380px;
            text-align: center;
        }
        h2 {
            color: #165DFF;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            height: 45px;
            margin: 8px 0;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #c2e2ff;
            border-radius: 10px;
            outline: none;
            text-align: center;
        }
        input:focus {
            border-color: #165DFF;
        }
        .btn {
            width: 65px;
            height: 55px;
            font-size: 22px;
            margin: 6px;
            border: none;
            border-radius: 10px;
            background: #165DFF;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover {
            background: #0040c9;
        }
        .login-btn {
            width: 120px !important;
            height: 45px;
            font-size: 16px;
        }
        .tip {
            font-size: 14px;
            color: #666;
            margin: 6px 0;
        }
        .result {
            margin-top: 20px;
            font-size: 24px;
            color: #165DFF;
            font-weight: bold;
            height: 36px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>蓝色计算器</h2>

    <!-- 登录 -->
    <input type="text" id="username" placeholder="账号：test">
    <input type="password" id="password" placeholder="密码：123456">
    <button class="btn login-btn" onclick="login()">登录</button>
    <div class="tip" id="loginTip"></div>

    <!-- VIP充值 -->
    <input type="text" id="vipCard" placeholder="VIP点卡：VIP2025BLUE">
    <button class="btn login-btn" onclick="recharge()">充值VIP</button>
    <div class="tip" id="vipTip"></div>

    <hr style="margin:16px 0;border-color:#e6f4ff">

    <!-- 计算 -->
    <input type="number" id="n1" placeholder="数字1">
    <input type="number" id="n2" placeholder="数字2">

    <div>
        <button class="btn" onclick="go('add')">+</button>
        <button class="btn" onclick="go('sub')">-</button>
        <button class="btn" onclick="go('mul')">×</button>
        <button class="btn" onclick="go('div')">÷</button>
    </div>

    <div class="result" id="result"></div>
</div>

<script>
    let userId = null;

    // 登录
    async function login() {
        let u = document.getElementById("username").value;
        let p = document.getElementById("password").value;
        let res = await fetch(`/calc/login?username=${u}&password=${p}`);
        let txt = await res.text();
        if (txt.startsWith("success")) {
            userId = txt.split(":")[1];
            document.getElementById("loginTip").innerText = "登录成功！";
        } else {
            document.getElementById("loginTip").innerText = "登录失败";
        }
    }

    // VIP充值
    async function recharge() {
        if (!userId) return alert("请先登录");
        let card = document.getElementById("vipCard").value;
        let res = await fetch(`/calc/recharge?userId=${userId}&card=${card}`);
        document.getElementById("vipTip").innerText = await res.text();
    }
